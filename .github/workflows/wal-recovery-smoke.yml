name: WAL Recovery Smoke

# Runs scripts/wal-recovery-smoke.sh against the social-api bootstrap to
# guarantee that BOTH WAL surfaces — the EventBus WAL (PIPELINE_WAL_PATH)
# and the ResourceRegistry entity WAL (PIPELINE_REGISTRY_WAL_PATH, switched
# on in social-api/src/pipeline/bootstrap.ts) — wire up cleanly and survive
# an unclean kill-9 + restart.
#
# Triggered only when something that could plausibly affect the bootstrap
# changed: the bootstrap itself, the smoke script, the workflow file, or
# the social-api package manifests / lockfile (which pin the
# distributed-core version that owns the WAL replay path).

# Auto-triggers disabled — see ci.yml for the rationale (private DC dep
# needs DC_REPO_TOKEN repo secret to be set up). Re-enable by restoring
# the `push:` and `pull_request:` blocks below; manual run still available
# via the Actions tab → "Run workflow".
on: workflow_dispatch
# on:
#   push:
#     branches: [main]
#     paths:
#       - 'social-api/src/pipeline/**'
#       - 'social-api/src/index.ts'
#       - 'social-api/package.json'
#       - 'social-api/package-lock.json'
#       - 'scripts/wal-recovery-smoke.sh'
#       - '.github/workflows/wal-recovery-smoke.yml'
#   pull_request:
#     branches: [main]
#     paths:
#       - 'social-api/src/pipeline/**'
#       - 'social-api/src/index.ts'
#       - 'social-api/package.json'
#       - 'social-api/package-lock.json'
#       - 'scripts/wal-recovery-smoke.sh'
#       - '.github/workflows/wal-recovery-smoke.yml'

# Workflow-level timeout; the script's STARTUP_TIMEOUT covers each boot,
# but if something hangs outside the wait_for_log loop we still want the
# job to fail fast rather than burn the GHA 6-hour default.
concurrency:
  group: wal-recovery-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    # 5 minutes covers two ts-node-dev cold boots (~30-60s each) plus the
    # stabilization window with comfortable headroom. The script itself caps
    # each boot at STARTUP_TIMEOUT=60s.
    timeout-minutes: 5
    steps:
      # `distributed-core` is now a git-URL dep (`git+https://github.com/
      # connorhoehn/distributed-core.git#vX.Y.Z`) — npm fetches the pinned
      # tag at install time and runs its `prepare` script to build dist/.
      # We just need GitHub auth for the private repo; see the rewrite
      # step below.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-api/package-lock.json

      # See ci.yml for the full rationale on this rewrite. distributed-core
      # is a private repo; without a token-bearing HTTPS URL, npm ci fails
      # on the lockfile's git+ssh resolved field. See .planning/handoff/CI-SETUP.md.
      - name: Configure git for private DC dep
        env:
          DC_TOKEN: ${{ secrets.DC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$DC_TOKEN" ]; then
            echo "::error::Neither DC_REPO_TOKEN nor GITHUB_TOKEN is available — cannot fetch private distributed-core dep. See .planning/handoff/CI-SETUP.md"
            exit 1
          fi
          REWRITE="https://x-access-token:${DC_TOKEN}@github.com/"
          git config --global --add url."${REWRITE}".insteadOf "ssh://git@github.com/"
          git config --global --add url."${REWRITE}".insteadOf "git@github.com:"
          git config --global --add url."${REWRITE}".insteadOf "https://github.com/"
          git config --global --add url."${REWRITE}".insteadOf "git://github.com/"
          rule_count=$(git config --global --get-all url."${REWRITE}".insteadOf | wc -l | tr -d ' ')
          [ "$rule_count" -eq 4 ] || (echo "::error::expected 4 git rewrite rules, got $rule_count"; exit 1)
          # Verify the token can actually read distributed-core BEFORE npm ci
          # so we get a clear error instead of 20 lines of npm debug output.
          if ! git ls-remote "https://x-access-token:${DC_TOKEN}@github.com/connorhoehn/distributed-core.git" HEAD >/dev/null 2>&1; then
            echo "::error::Token rejected by connorhoehn/distributed-core. Set DC_REPO_TOKEN repo secret to a PAT with read access. See .planning/handoff/CI-SETUP.md"
            exit 1
          fi

      - name: Install social-api deps
        working-directory: social-api
        run: npm ci

      - name: Make smoke script executable
        run: chmod +x scripts/wal-recovery-smoke.sh

      # The script writes its own "FAIL: <what was expected vs what was
      # found>" lines to stderr, plus a tail of the failing boot's log,
      # so a failed run shows actionable detail in the GHA log without
      # any extra plumbing here.
      - name: Run WAL recovery smoke
        env:
          # Pin a generous startup timeout for ts-node-dev cold compile in
          # CI (the default 60s in the script is already conservative; this
          # tightens or relaxes it without editing the script). 90s here
          # gives a clear error window before the workflow-level 5-min cap.
          STARTUP_TIMEOUT: '90'
          # Explicit tmp paths just for clarity in the GHA log; the script
          # mktemp's its own dir if these aren't set, but pinning them under
          # $RUNNER_TEMP keeps GHA's auto-cleanup happy and avoids
          # /var/lib/social-api/ on the runner.
          TMPDIR: ${{ runner.temp }}
        run: ./scripts/wal-recovery-smoke.sh
