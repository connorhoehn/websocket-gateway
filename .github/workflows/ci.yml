name: CI
on: [push, pull_request]
jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci && npx tsc --noEmit
      - run: cd social-api && npm ci && npx tsc --noEmit
      - run: npm ci && node -e "require('./src/server.js')" # syntax check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t gateway:test .
      - run: docker build -t social-api:test social-api/
