name: CI
# Auto-triggers disabled — set DC_REPO_TOKEN repo secret first, then re-enable
# by replacing this `on:` block with `on: [push, pull_request]`.
# Manual run still possible via the Actions tab → "Run workflow".
on: workflow_dispatch
jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      # `distributed-core` is a private sibling repo pinned via git URL.
      # npm normalizes the lockfile's `resolved` field to git+ssh which CI
      # can't fetch (no SSH key). Two-pronged fix:
      #   1. Rewrite ssh://git@github.com/ → https://x-access-token:${TOKEN}@github.com/
      #   2. Provide TOKEN via the DC_REPO_TOKEN secret (a PAT with read
      #      access to connorhoehn/distributed-core). Falls back to
      #      GITHUB_TOKEN, which works only if the workflow has been granted
      #      cross-repo read at the org level.
      - name: Configure git for private DC dep
        env:
          DC_TOKEN: ${{ secrets.DC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$DC_TOKEN" ]; then
            echo "::error::Neither DC_REPO_TOKEN nor GITHUB_TOKEN is available — cannot fetch private distributed-core dep"
            exit 1
          fi
          # Multiple insteadOf rewrites because npm's hosted-git-info
          # normalizes GitHub URLs to several forms and uses ssh:// for
          # ls-remote even when the spec is git+https://. `--add` is
          # essential — without it each call overwrites the previous one
          # and only the last rule survives.
          REWRITE="https://x-access-token:${DC_TOKEN}@github.com/"
          git config --global --add url."${REWRITE}".insteadOf "ssh://git@github.com/"
          git config --global --add url."${REWRITE}".insteadOf "git@github.com:"
          git config --global --add url."${REWRITE}".insteadOf "https://github.com/"
          git config --global --add url."${REWRITE}".insteadOf "git://github.com/"
          # Sanity-check all 4 rules survived the --add calls.
          rule_count=$(git config --global --get-all url."${REWRITE}".insteadOf | wc -l | tr -d ' ')
          [ "$rule_count" -eq 4 ] || (echo "::error::expected 4 git rewrite rules, got $rule_count"; exit 1)
          # Verify the token can actually read distributed-core BEFORE npm ci
          # so we get a clear error instead of 20 lines of npm debug output.
          if ! git ls-remote "${REWRITE}connorhoehn/distributed-core.git" HEAD >/dev/null 2>&1; then
            echo "::error::Token rejected by connorhoehn/distributed-core. Set DC_REPO_TOKEN repo secret to a PAT with read access. See .planning/handoff/CI-SETUP.md"
            exit 1
          fi
      - run: cd frontend && npm ci && npx tsc --noEmit
      - run: cd social-api && npm ci && npx tsc --noEmit
      - run: npm ci && node --check src/server.js # syntax check
      - run: npm run check:types-sync
      - run: npm run check:contract-test-sync

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Verify the token can read distributed-core BEFORE the long social-api
      # docker build, so we fail in 1s with a clear message instead of 60s
      # into a Dockerfile layer.
      - name: Verify DC token
        env:
          DC_TOKEN: ${{ secrets.DC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$DC_TOKEN" ]; then
            echo "::error::Neither DC_REPO_TOKEN nor GITHUB_TOKEN is available. See .planning/handoff/CI-SETUP.md"
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${DC_TOKEN}@github.com/connorhoehn/distributed-core.git" HEAD >/dev/null 2>&1; then
            echo "::error::Token rejected by connorhoehn/distributed-core. Set DC_REPO_TOKEN repo secret to a PAT with read access. See .planning/handoff/CI-SETUP.md"
            exit 1
          fi
      # gateway image is built from src/package*.json (no private deps) —
      # plain build is fine.
      - run: docker build -t gateway:test .
      # social-api consumes the private distributed-core git-URL dep, so
      # we pass GH_TOKEN through a BuildKit secret. The Dockerfile rewrites
      # git URLs only during install; the token is never written into a
      # layer of the final image.
      - name: Build social-api image (with private DC dep)
        env:
          DOCKER_BUILDKIT: '1'
          GH_TOKEN: ${{ secrets.DC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: docker build --secret id=gh_token,env=GH_TOKEN -t social-api:test social-api/
