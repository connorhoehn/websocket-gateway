{{- if .Values.coturn.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lvb.fullname" . }}-coturn
  labels:
    app: coturn
    {{- include "lvb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: coturn
  ports:
  - port: {{ .Values.coturn.ports.listening }}
    targetPort: {{ .Values.coturn.ports.listening }}
    protocol: UDP
    name: stun-udp
  - port: {{ .Values.coturn.ports.listening }}
    targetPort: {{ .Values.coturn.ports.listening }}
    protocol: TCP
    name: stun-tcp
{{- end }}
