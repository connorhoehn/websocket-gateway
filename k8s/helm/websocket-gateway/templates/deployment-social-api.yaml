{{- if .Values.socialApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "websocket-gateway.fullname" . }}-social-api
  labels:
    {{- include "websocket-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: social-api
spec:
  replicas: {{ .Values.socialApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "websocket-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: social-api
  template:
    metadata:
      labels:
        {{- include "websocket-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: social-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: social-api
          image: "{{ .Values.socialApi.image.repository }}:{{ .Values.socialApi.image.tag }}"
          imagePullPolicy: {{ .Values.socialApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.socialApi.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "websocket-gateway.fullname" . }}-social-api-config
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.socialApi.resources | nindent 12 }}
{{- end }}
