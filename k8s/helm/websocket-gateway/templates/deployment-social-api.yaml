{{- if .Values.socialApi.enabled }}
{{- include "websocket-gateway.deployment" (dict
  "root" .
  "name" "social-api"
  "component" "social-api"
  "image" .Values.socialApi.image
  "port" .Values.socialApi.port
  "envFromConfigMap" "social-api-config"
  "replicas" .Values.socialApi.replicaCount
  "resources" .Values.socialApi.resources
  "probes" (dict "livenessPath" "/health" "readinessPath" "/health")
) }}
{{- end }}
