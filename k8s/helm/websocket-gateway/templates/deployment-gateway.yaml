{{- include "websocket-gateway.deployment" (dict
  "root" .
  "name" "gateway"
  "component" "gateway"
  "image" .Values.gateway.image
  "port" .Values.gateway.port
  "envFromConfigMap" "config"
  "replicas" .Values.gateway.replicaCount
  "resources" .Values.gateway.resources
  "probes" (dict "livenessPath" "/health" "readinessPath" "/health")
) }}
